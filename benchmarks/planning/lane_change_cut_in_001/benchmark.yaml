api_version: apg/v0
kind: Benchmark

name: lane_change_cut_in_001
task: planning
description: Ego starts a lane change while a target-lane vehicle cuts into the gap.

runner:
  type: scenario_simulator_v2
  headless: true
  timeout_sec: 180
  scenario: scenario/scenario.yaml
  rosbag: null

assets:
  map: assets/maps/sample_map/asset.yaml
  scenario: assets/scenarios/sample_lane_change/asset.yaml
  rosbag: null

autoware:
  launch:
    package: autoware_launch
    file: planning_simulator.launch.xml
  vehicle_model: sample_vehicle
  sensor_model: sample_sensor_kit

metrics:
  config: metrics.yaml

gates:
  required:
    - name: no_collision
      op: "=="
      value: true
    - name: route_completion
      op: ">="
      value: 0.95
  diagnostic:
    - name: min_ttc_sec
      op: ">="
      value: 1.5
    - name: max_jerk_mps3
      op: "<="
      value: 4.0
    - name: planner_oscillation
      op: "=="
      value: false

failure_taxonomy:
  - collision
  - near_miss
  - planner_oscillation
  - deadlock
  - sim_invalid
