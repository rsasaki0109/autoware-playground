api_version: apg/v0
kind: Benchmark

name: static_obstacle_lidar_001
task: perception
description: Static obstacle detection benchmark using LiDAR replay.

runner:
  type: rosbag_replay
  headless: true
  timeout_sec: 120
  scenario: null
  rosbag: "$APG_DATA/rosbags/sample_lidar_localization_bag"

assets:
  map: assets/maps/sample_map/asset.yaml
  scenario: null
  rosbag: assets/rosbags/sample_lidar_localization/asset.yaml

autoware:
  launch:
    package: autoware_launch
    file: logging_simulator.launch.xml
  vehicle_model: sample_vehicle
  sensor_model: sample_sensor_kit

metrics:
  config: metrics.yaml

gates:
  required:
    - name: obstacle_detected
      op: "=="
      value: true
    - name: no_large_false_positive_in_drivable_area
      op: "=="
      value: true
  diagnostic:
    - name: detection_latency_ms
      op: "<="
      value: 250.0
    - name: missed_detection_count
      op: "<="
      value: 0

failure_taxonomy:
  - missed_detection
  - near_miss
  - sim_invalid
