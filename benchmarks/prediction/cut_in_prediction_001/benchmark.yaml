api_version: apg/v0
kind: Benchmark

name: cut_in_prediction_001
task: prediction
description: Cut-in actor trajectory prediction benchmark.

runner:
  type: scenario_simulator_v2
  headless: true
  timeout_sec: 180
  scenario: "$APG_DATA/scenarios/sample_lane_change/scenario.yaml"
  rosbag: null

assets:
  map: assets/maps/sample_map/asset.yaml
  scenario: assets/scenarios/sample_lane_change/asset.yaml
  rosbag: null

autoware:
  launch:
    package: autoware_launch
    file: planning_simulator.launch.xml
  vehicle_model: sample_vehicle
  sensor_model: sample_sensor_kit

metrics:
  config: metrics.yaml

gates:
  required:
    - name: prediction_topic_available
      op: "=="
      value: true
  diagnostic:
    - name: minADE
      op: "<="
      value: 2.0
    - name: minFDE
      op: "<="
      value: 4.0

failure_taxonomy:
  - near_miss
  - missed_detection
  - sim_invalid
