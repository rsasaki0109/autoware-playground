name: lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install apg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e tools/apg pytest
      - name: Validate manifests
        run: apg validate .
      - name: Lint (allow dry-run baselines)
        run: apg lint . --allow-dry-run-baselines
      - name: Run tests
        run: python -m pytest -q
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

  strict-lint:
    # Informational only: fails while any baseline_status='dry_run' baseline
    # is still committed. Replacing baselines with real runs flips this green.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install apg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e tools/apg
      - name: Strict lint (surface dry-run baselines)
        run: apg lint .
