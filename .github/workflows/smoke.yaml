name: smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dry-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: planning
            benchmark: benchmarks/planning/lane_change_cut_in_001
            experiment: experiments/planning/safe_gap_ttc_planner
          - task: perception
            benchmark: benchmarks/perception/static_obstacle_lidar_001
            experiment: experiments/perception/lidar_cluster_baseline
          - task: localization
            benchmark: benchmarks/localization/lidar_localization_replay_001
            experiment: experiments/localization/icp_registration_toy
          - task: prediction
            benchmark: benchmarks/prediction/cut_in_prediction_001
            experiment: experiments/prediction/constant_velocity_baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install apg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e tools/apg
      - name: Dry run (${{ matrix.task }})
        run: |
          apg run ${{ matrix.benchmark }} \
            --experiment ${{ matrix.experiment }} \
            --headless \
            --dry-run \
            --report
      - name: Validate generated run
        run: apg validate runs/latest/result.json
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: apg-smoke-report-${{ matrix.task }}
          path: runs/latest/

  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install apg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e tools/apg
      - name: Dry run baseline (planning autoware_baseline)
        run: |
          apg run benchmarks/planning/lane_change_cut_in_001 \
            --experiment experiments/planning/autoware_baseline \
            --headless \
            --dry-run \
            --output runs/_baseline
      - name: Dry run experiment (planning safe_gap_ttc_planner)
        run: |
          apg run benchmarks/planning/lane_change_cut_in_001 \
            --experiment experiments/planning/safe_gap_ttc_planner \
            --headless \
            --dry-run \
            --output runs/_experiment
      - name: Compare baseline vs experiment
        run: |
          BASELINE=$(ls -1 runs/_baseline/*/result.json | head -1)
          EXPERIMENT=$(ls -1 runs/_experiment/*/result.json | head -1)
          apg compare "$BASELINE" "$EXPERIMENT" --json | tee compare.json
      - name: Upload compare result
        uses: actions/upload-artifact@v4
        with:
          name: apg-smoke-compare
          path: compare.json

  real-rosbag-replay:
    # REAL (non-dry-run) benchmark jobs: actually invoke
    # `ros2 bag play` on a synthetic bag and write a real RunRecord
    # for every rosbag_replay benchmark in the repository.
    strategy:
      fail-fast: false
      matrix:
        include:
          - run_key: localization-ndt
            benchmark: benchmarks/localization/lidar_localization_replay_001
            experiment: experiments/localization/ndt_baseline
          - run_key: localization-icp
            benchmark: benchmarks/localization/lidar_localization_replay_001
            experiment: experiments/localization/icp_registration_toy
          - run_key: perception-cluster
            benchmark: benchmarks/perception/static_obstacle_lidar_001
            experiment: experiments/perception/lidar_cluster_baseline
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install apg
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          python3 -m pip install --user --break-system-packages --upgrade pip
          python3 -m pip install --user --break-system-packages -e tools/apg
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Generate synthetic rosbag
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          mkdir -p /tmp/apg_data/rosbags
          python3 tools/scripts/make_sample_rosbag.py \
            /tmp/apg_data/rosbags/sample_lidar_localization_bag
      - name: Run real rosbag_replay benchmark (${{ matrix.run_key }})
        shell: bash
        env:
          APG_DATA: /tmp/apg_data
        run: |
          source /opt/ros/jazzy/setup.bash
          apg run ${{ matrix.benchmark }} \
            --experiment ${{ matrix.experiment }} \
            --headless \
            --report
      - name: Verify RunRecord is real
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          apg validate runs/latest/result.json
          python3 - <<'PY'
          import json
          d = json.load(open("runs/latest/result.json"))
          assert d["execution"]["baseline_status"] == "real", d["execution"]
          assert d["execution"]["dry_run"] is False, d["execution"]
          assert d["execution"]["status"] == "completed", d["execution"]
          assert d["metrics"]["play_returncode"] == 0, d["metrics"]
          assert d["metrics"]["rosbag_message_count"] == 10, d["metrics"]
          print("real RunRecord verified:", d["run_id"])
          PY
      - name: Upload real RunRecord
        uses: actions/upload-artifact@v4
        with:
          name: apg-real-rosbag-replay-${{ matrix.run_key }}
          path: runs/latest/

  leaderboard:
    # Aggregate every real RunRecord produced by the matrix above and
    # publish a benchmark x experiment table as an artifact. On main
    # push, also commit the markdown table back to reports/leaderboard.md
    # so the latest leaderboard is visible directly on GitHub.
    needs: real-rosbag-replay
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install apg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e tools/apg
      - name: Download real RunRecords
        uses: actions/download-artifact@v4
        with:
          pattern: apg-real-rosbag-replay-*
          path: ci_artifacts/
      - name: Stage RunRecords into runs/
        shell: bash
        run: |
          mkdir -p runs
          shopt -s nullglob
          for d in ci_artifacts/apg-real-rosbag-replay-*/; do
            [ -f "${d}result.json" ] || continue
            run_id=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['run_id'])" "${d}result.json")
            dest="runs/${run_id}"
            mkdir -p "$dest"
            cp "${d}result.json" "${dest}/result.json"
            # Carry the per-run report.html if the matrix step produced one
            # so the HTML leaderboard can link to it.
            if [ -f "${d}report.html" ]; then
              cp "${d}report.html" "${dest}/report.html"
            fi
          done
          ls runs/
      - name: Regenerate baseline report.html
        # Make sure every committed baseline has a sibling report.html so the
        # HTML leaderboard can link to it (apg report is idempotent).
        shell: bash
        run: |
          shopt -s nullglob
          for r in benchmarks/*/*/baselines/*/result.json; do
            apg report "$r"
          done
      - name: Generate leaderboard
        run: |
          apg leaderboard --format markdown > leaderboard.md
          apg leaderboard --format json > leaderboard.json
          apg leaderboard > leaderboard.txt
          # HTML lives at reports/leaderboard.html — link_base ".." so links
          # escape reports/ and reach benchmarks/ and runs/ at the repo root.
          apg leaderboard --format html --link-base .. > leaderboard.html
          echo "=== leaderboard.md ==="
          cat leaderboard.md
      - name: Upload leaderboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: apg-leaderboard
          path: |
            leaderboard.md
            leaderboard.json
            leaderboard.txt
            leaderboard.html
      - name: Commit leaderboard to reports/ (main push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p reports
          {
            echo "<!-- AUTO-GENERATED by .github/workflows/smoke.yaml -->"
            echo "<!-- Source: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID -->"
            echo
            echo "# autoware-playground leaderboard"
            echo
            echo "Generated by CI from real rosbag_replay RunRecords plus committed baselines."
            echo "See [plan.md §27](../plan.md) for status of the scenario_simulator_v2 path."
            echo "An HTML version with per-row links lives at [\`reports/leaderboard.html\`](./leaderboard.html)."
            echo
            cat leaderboard.md
          } > reports/leaderboard.md
          cp leaderboard.html reports/leaderboard.html
          # Also stage any baseline report.html that regeneration produced so
          # the HTML leaderboard's links resolve in-tree.
          git add reports/leaderboard.md reports/leaderboard.html
          shopt -s nullglob
          for r in benchmarks/*/*/baselines/*/report.html; do
            git add "$r"
          done
          if git diff --cached --quiet; then
            echo "reports unchanged; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update reports/leaderboard.{md,html} from smoke run ${GITHUB_RUN_ID} [skip ci]"
          git push
