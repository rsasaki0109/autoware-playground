name: smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install apg
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e tools/apg
      - name: Planning dry run
        run: |
          apg run benchmarks/planning/lane_change_cut_in_001 \
            --experiment experiments/planning/safe_gap_ttc_planner \
            --headless \
            --dry-run \
            --report
      - name: Validate generated run
        run: apg validate runs/latest/result.json
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: apg-smoke-report
          path: runs/latest/report.html
